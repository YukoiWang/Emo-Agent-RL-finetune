# Multi-turn GRPO with Emo Reward (same rollout/reward as PPO-Emo)
# 使用: python scripts/rl/run_rl.py --config configs/rl_grpo_emo.yaml
seed: 42

model:
  sft_model_path: "/home/ytwong/Emo-Agent-RL-finetune/Qwen2.5-1.5B-Instruct"
  dtype: "bfloat16"
  use_lora: true

data:
  data_dir: "data/data"
  train_file: "data/data/train_profile.jsonl"
  batch_size: 1
  max_scene_len: 800

rollout:
  max_turns: 4
  max_new_tokens_per_turn: 128
  use_planning_emo: true
  planning_service_url: "http://localhost:8765"
  user_llm: "deepseek"
  user_llm_model: "deepseek-chat"
  target: "eq"
  temperature: 0.8
  top_p: 0.95

rl:
  algo: "grpo_emo"
  grpo:
    num_generations: 4
    learning_rate: 5.0e-6
    epsilon: 0.2
    beta: 0.02
    gradient_accumulation_steps: 4

reward:
  type: "emo"
  reward_mode: "mode1"
  w1: 1.0
  w2: 0.3
  w3: 0.2
  trend_n: 5
  S1: 100
  S2: 300
  warmup_steps: 200

training:
  output_dir: "outputs/grpo_emo_mode1"
  total_steps: 375
  logging_steps: 10
  save_steps: 100
  save_total_limit: 3
