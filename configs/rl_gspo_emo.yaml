# Multi-turn GSPO (Group Sequence Policy Optimization) with Emo Reward
# 基于 Qwen GSPO 算法 (arXiv:2507.18071)，序列级重要性比率 + 多步梯度更新
# 使用: python scripts/rl/run_rl.py --config configs/rl_gspo_emo.yaml
seed: 42

model:
  sft_model_path: "/home/ytwong/Emo-Agent-RL-finetune/Qwen2.5-1.5B-Instruct"
  dtype: "bfloat16"
  use_lora: true

data:
  data_dir: "data/data"
  train_file: "data/data/train_profile.jsonl"
  batch_size: 1
  max_scene_len: 800

rollout:
  max_turns: 4
  max_new_tokens_per_turn: 128
  use_planning_emo: true
  # planning_service_url: "http://localhost:8765"  # 本地服务（已停用）
  planning_llm: "deepseek"
  planning_llm_model: "deepseek-chat"
  user_llm: "deepseek"
  user_llm_model: "deepseek-chat"
  target: "eq"
  temperature: 0.8
  top_p: 0.95

rl:
  algo: "gspo_emo"
  gspo:
    num_generations: 4
    learning_rate: 5.0e-6
    # GSPO 使用远小于 GRPO 的 ε（序列级比率方差更小）
    epsilon: 3.0e-4
    epsilon_high: 4.0e-4          # 非对称 clipping 上界
    beta: 0.0                     # KL 系数，GSPO 默认不使用 KL
    steps_per_generation: 4       # 每批 rollout 复用 K 次梯度更新
    gradient_accumulation_steps: 4

reward:
  type: "emo"
  reward_mode: "mode1"            # mode1 / mode2 / mode3
  w1: 1.0
  w2: 0.3
  w3: 0.2
  trend_n: 5
  S1: 100
  S2: 300
  warmup_steps: 200

training:
  output_dir: "outputs/gspo_emo_mode1"
  total_steps: 375
  logging_steps: 10
  save_steps: 100
  save_total_limit: 3
