seed: 42

model:
  sft_model_path: "Qwen/Qwen2.5-1.5B-Instruct"
  dtype: "bfloat16"
  use_lora: true

data:
  # 多轮 PPO：Profile 数据目录；单轮 PPO 见 static-rl/run_ppo.py
  data_dir: "data/data"
  train_file: "data/data/train_profile.jsonl"
  batch_size: 2
  max_scene_len: 1500
  max_prompt_length: 512
  max_response_length: 256
  num_proc: 4

rollout:
  max_turns: 8
  max_new_tokens_per_turn: 128
  use_planning_emo: true
  user_llm: "mock"
  target: "eq"
  temperature: 0.8
  top_p: 0.95

rl:
  algo: "ppo"  # 或 "dpo" / "kto" 等

  # PPO 相关参数（16G 显存需 batch_size=2, mini_batch_size=1）
  ppo:
    batch_size: 2
    mini_batch_size: 1
    gradient_checkpointing: true
    ppo_epochs: 4
    learning_rate: 1.0e-6
    gamma: 1.0
    lam: 0.95
    clip_range: 0.2
    kl_penalty_coef: 0.02

  # DPO 相关参数（如果使用）
  dpo:
    beta: 0.1
    learning_rate: 2.0e-6
    per_device_train_batch_size: 2
    gradient_accumulation_steps: 8

reward:
  type: "emo"
  reward_mode: "mode1"
  w1: 1.0
  w2: 0.3
  w3: 0.2
  trend_n: 5
  S1: 100
  S2: 300
  warmup_steps: 200

training:
  output_dir: "outputs/rl"
  total_steps: 5000
  logging_steps: 50
  save_steps: 500
  save_total_limit: 3

