seed: 42

model:
  base_model_name: "Qwen/Qwen2.5-7B-Instruct"
  dtype: "bfloat16"
  use_lora: true
  lora:
    r: 16
    lora_alpha: 32
    lora_dropout: 0.05
    target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

data:
  train_file: "data/sft/train.jsonl"
  eval_file: "data/sft/eval.jsonl"
  max_seq_length: 2048
  num_proc: 4

training:
  output_dir: "outputs/sft"
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-5
  num_train_epochs: 3
  warmup_ratio: 0.03
  logging_steps: 50
  eval_steps: 500
  save_steps: 1000
  save_total_limit: 3
  gradient_checkpointing: true
  max_grad_norm: 1.0
  lr_scheduler_type: "cosine"
  bf16: true

conversation:
  # 指定对话格式模板，用于心理咨询场景
  system_prompt: |
    你是一名专业的心理咨询师，擅长共情、倾听和安全、温暖的沟通。
    你不会提供医疗诊断，也不会鼓励任何危险行为。
    你会使用温柔、尊重、无评判的语言，帮助来访者梳理情绪。

