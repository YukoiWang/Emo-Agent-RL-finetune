# EmpatheticDialogues SFT（共情对话微调）
# 使用 Qwen2.5-1.5B-Instruct + LoRA
# 数据需先运行: python scripts/data/download_empathetic_dialogues.py
seed: 42

model:
  base_model_name: "Qwen/Qwen2.5-1.5B-Instruct"
  dtype: "bfloat16"
  use_lora: true
  lora:
    r: 16
    lora_alpha: 32
    lora_dropout: 0.05
    target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

data:
  train_file: "data/empathetic_dialogues/train.jsonl"
  eval_file: "data/empathetic_dialogues/validation.jsonl"
  max_seq_length: 2048
  num_proc: 4

training:
  output_dir: "outputs/sft_empathetic"
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 2
  learning_rate: 1.0e-5
  num_train_epochs: 3
  warmup_ratio: 0.03
  logging_steps: 50
  eval_steps: 300
  save_steps: 500
  save_total_limit: 3
  gradient_checkpointing: true
  max_grad_norm: 1.0
  lr_scheduler_type: "cosine"
  bf16: true
