# DPO 训练配置 - 使用 IPM-PrefDial (DecoupledESC) 偏好数据
# 使用方法:
#   1. 运行: python scripts/convert_ipm_prefdial.py -o data/ipm_prefdial_dpo.jsonl
#   2. 运行: python scripts/run_rl.py --config configs/rl_dpo.yaml

seed: 42

model:
  sft_model_path: "Qwen/Qwen2.5-1.5B-Instruct"
  dtype: "bfloat16"
  use_lora: true

data:
  # DPO 偏好对数据（user/prompt, chosen, rejected）
  train_file: "data/ipm_prefdial_dpo.jsonl"
  max_prompt_length: 512
  max_response_length: 256
  num_proc: 4

rl:
  algo: "dpo"

  dpo:
    beta: 0.1
    learning_rate: 2.0e-6
    per_device_train_batch_size: 2
    gradient_accumulation_steps: 8

training:
  output_dir: "outputs/dpo"
  num_train_epochs: 1
  max_steps: -1   # -1 表示跑完所有 epoch
  save_steps: 500
  logging_steps: 50
  save_total_limit: 3
