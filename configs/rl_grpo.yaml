# GRPO 训练配置（仿照 PPO 的 rl_test.yaml）
# 使用: python scripts/run_rl.py --config configs/rl_grpo.yaml
seed: 42

model:
  sft_model_path: "Qwen/Qwen2.5-1.5B-Instruct"
  dtype: "bfloat16"
  use_lora: true

data:
  train_file: "data/data/train_profile.jsonl"
  max_prompt_length: 512
  max_response_length: 64
  num_proc: 1

rl:
  algo: "grpo"
  grpo:
    batch_size: 2
    num_generations: 4
    learning_rate: 1.0e-6
    epsilon: 0.2
    beta: 0.0
    scale_rewards: true
    temperature: 1.0
    top_p: 1.0

training:
  output_dir: "outputs/rl_grpo_test"
  total_steps: 5000
  logging_steps: 50
  save_steps: 500
  save_total_limit: 3
