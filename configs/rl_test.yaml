# 用于快速验证 PPO 能否跑通的最小配置
# 使用基座模型（无 SFT）直接测试；若显存不足可改用 Qwen/Qwen2.5-0.5B-Instruct
seed: 42

model:
  # 0.5B 仅 ~1GB，适合显存/磁盘有限时测试；7B 需约 16GB
  sft_model_path: "Qwen/Qwen2.5-0.5B-Instruct"
  dtype: "bfloat16"
  use_lora: true
  lora:
    r: 16
    lora_alpha: 32
    lora_dropout: 0.05
    target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

data:
  train_file: "data/data/train_profile.jsonl"
  max_prompt_length: 512
  max_response_length: 64
  num_proc: 1

rl:
  algo: "ppo"
  ppo:
    batch_size: 2
    mini_batch_size: 2
    ppo_epochs: 2
    learning_rate: 1.0e-6
    gamma: 1.0
    lam: 0.95
    clip_range: 0.2
    kl_penalty_coef: 0.02

training:
  output_dir: "outputs/rl_test"
  total_steps: 5000
  logging_steps: 50
  save_steps: 500
  save_total_limit: 3

reward:
  type: "emo"
  emo_adapter_path: "/home/yukiwang/xlwy/emo_classifier_lora/checkpoint-11025"
  reward_mode: "mode1"
  # mode2/mode3 可选: w1, w2, w3, trend_n, S1, S2, warmup_steps