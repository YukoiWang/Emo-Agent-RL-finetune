# Reward Model 全量微调 - EmpatheticDialogues 偏好对
# 用法: python static-rl/run_reward_model.py --config static-rl/configs/reward_model_full.yaml

reward_model:
  base_model: "Qwen/Qwen2.5-0.5B-Instruct"
  dtype: "bfloat16"
  use_lora: false
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 5.0e-6   # 全量微调用较小 lr

data:
  train_file: "static-rl/data/empathetic_preference.jsonl"

training:
  # PPO/GRPO 使用全量 RM 时，reward.reward_model_path 需指向此目录
  output_dir: "static-rl/outputs/reward_model_full"
  num_train_epochs: 1
  logging_steps: 50
  save_steps: 500
