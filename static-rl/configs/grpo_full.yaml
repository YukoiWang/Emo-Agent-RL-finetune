# GRPO 全量微调 - EmpatheticDialogues prompt + Reward Model
# 用法: python static-rl/run_grpo.py --config static-rl/configs/grpo_full.yaml

seed: 42

model:
  base_model: "Qwen/Qwen2.5-1.5B-Instruct"
  sft_model_path: "outputs/sft_empathetic/final"
  dtype: "bfloat16"
  use_lora: false

data:
  train_file: "static-rl/data/empathetic_preference.jsonl"
  max_prompt_length: 512
  max_response_length: 256
  num_proc: 4

reward:
  reward_model_path: "static-rl/outputs/reward_model"  # 全量 RM 时改为 reward_model_full

rl:
  grpo:
    num_generations: 4
    learning_rate: 5.0e-8   # 全量用更小 lr
    epsilon: 0.2
    beta: 0.02
    temperature: 1.0
    top_p: 1.0

training:
  output_dir: "static-rl/outputs/grpo_full"
  total_steps: 1000
  logging_steps: 10
  save_steps: 500
