# GRPO 训练配置 (LoRA) - EmpatheticDialogues prompt + Reward Model
# 用法: python static-rl/run_grpo.py --config static-rl/configs/grpo.yaml
# 前置: 1. build_empathetic_preference_dataset.py  2. run_reward_model.py

seed: 42

model:
  base_model: "Qwen/Qwen2.5-1.5B-Instruct"
  sft_model_path: "outputs/sft_empathetic/final"
  dtype: "bfloat16"
  use_lora: true   # false 时全量微调，见 grpo_full.yaml

data:
  train_file: "static-rl/data/empathetic_preference.jsonl"
  max_prompt_length: 512
  max_response_length: 256
  num_proc: 4

reward:
  reward_model_path: "static-rl/outputs/reward_model"

rl:
  grpo:
    num_generations: 4
    learning_rate: 1.0e-6
    epsilon: 0.2
    beta: 0.02
    temperature: 1.0
    top_p: 1.0

training:
  output_dir: "static-rl/outputs/grpo"
  total_steps: 1000
  logging_steps: 10
  save_steps: 500
