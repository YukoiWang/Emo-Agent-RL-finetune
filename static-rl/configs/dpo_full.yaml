# DPO 全量微调 - EmpatheticDialogues 偏好对
# 用法: python static-rl/run_dpo.py --config static-rl/configs/dpo_full.yaml

seed: 42

model:
  base_model: "Qwen/Qwen2.5-1.5B-Instruct"
  sft_model_path: "outputs/sft_empathetic/final"
  dtype: "bfloat16"
  use_lora: false

data:
  train_file: "static-rl/data/empathetic_preference.jsonl"
  max_prompt_length: 512
  max_response_length: 256
  num_proc: 4

rl:
  algo: "dpo"
  dpo:
    beta: 0.1
    learning_rate: 5.0e-7   # 全量用更小 lr
    per_device_train_batch_size: 2
    gradient_accumulation_steps: 8

training:
  output_dir: "static-rl/outputs/dpo_full"
  num_train_epochs: 1
  max_steps: -1
  save_steps: 500
  logging_steps: 50
  save_total_limit: 3
