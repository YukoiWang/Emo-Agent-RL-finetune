# PPO 全量微调 - EmpatheticDialogues prompt + Reward Model
# 用法: python static-rl/run_ppo.py --config static-rl/configs/ppo_full.yaml

seed: 42

model:
  base_model: "Qwen/Qwen2.5-1.5B-Instruct"
  sft_model_path: "outputs/sft_empathetic/final"
  dtype: "bfloat16"
  use_lora: false

data:
  train_file: "static-rl/data/empathetic_preference.jsonl"
  max_prompt_length: 512
  max_response_length: 256
  num_proc: 4

reward:
  reward_model_path: "static-rl/outputs/reward_model"  # 全量 RM 时改为 reward_model_full

rl:
  ppo:
    batch_size: 8
    mini_batch_size: 2
    gradient_checkpointing: true
    ppo_epochs: 4
    learning_rate: 5.0e-8   # 全量用更小 lr
    gamma: 1.0
    lam: 0.95
    clip_range: 0.2
    kl_penalty_coef: 0.02

training:
  output_dir: "static-rl/outputs/ppo_full"
  total_steps: 5000
  save_steps: 500
  save_total_limit: 3
