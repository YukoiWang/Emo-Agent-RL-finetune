# Reward Model 训练配置 - 使用 ipm_prefdial_dpo 数据
reward_model:
  base_model: "Qwen/Qwen2.5-0.5B-Instruct"
  dtype: "bfloat16"
  use_lora: true
  lora_r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  per_device_train_batch_size: 2   # ipm 对话较长，适当减小 batch
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-5

data:
  train_file: "data/ipm_prefdial_dpo.jsonl"

training:
  output_dir: "static-rl/outputs/reward_model"
  num_train_epochs: 1
  logging_steps: 50
  save_steps: 500
