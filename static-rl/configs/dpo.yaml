# DPO 训练配置 (LoRA) - EmpatheticDialogues 偏好对
# 用法: python static-rl/run_dpo.py --config static-rl/configs/dpo.yaml
# 前置: python static-rl/build_empathetic_preference_dataset.py

seed: 42

model:
  base_model: "Qwen/Qwen2.5-1.5B-Instruct"   # 从零开始时的基础模型
  sft_model_path: "outputs/sft_empathetic/final"  # SFT 后模型，优先使用
  dtype: "bfloat16"
  use_lora: true   # false 时全量微调，见 dpo_full.yaml

data:
  train_file: "static-rl/data/empathetic_preference.jsonl"
  max_prompt_length: 512
  max_response_length: 256
  num_proc: 4

rl:
  algo: "dpo"
  dpo:
    beta: 0.1
    learning_rate: 2.0e-6
    per_device_train_batch_size: 2
    gradient_accumulation_steps: 8

training:
  output_dir: "static-rl/outputs/dpo"
  num_train_epochs: 1
  max_steps: -1
  save_steps: 500
  logging_steps: 50
  save_total_limit: 3
